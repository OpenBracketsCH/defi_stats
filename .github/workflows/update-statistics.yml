name: Update Defibrillator Statistics

on:
  schedule:
    # Läuft am 1. jeden Monats um 09:00 UTC (10:00 CET / 11:00 CEST)
    - cron: '0 9 1 * *'
  workflow_dispatch: # Erlaubt manuelles Auslösen

jobs:
  update-stats:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Fetch Defibrillator Data
        run: |
          # Liste aller Schweizer Kantone
          CANTONS="ag ai ar be bl bs fr ge gl gr ju lu ne nw ow sg sh so sz tg ti ur vd vs zg zh"
          
          TOTAL=0
          
          for CANTON in $CANTONS; do
            echo "Fetching ${CANTON}..."
            URL="https://cdn.jsdelivr.net/gh/OpenBracketsCH/defi_data@main/data/json/defis_kt_${CANTON}.geojson"
            
            # Lade GeoJSON und zähle Features
            COUNT=$(curl -s "$URL" | jq '.features | length')
            
            if [ ! -z "$COUNT" ] && [ "$COUNT" -gt 0 ]; then
              echo "  ${CANTON}: ${COUNT} Defis"
              TOTAL=$((TOTAL + COUNT))
            else
              echo "  ${CANTON}: Fehler beim Laden"
            fi
          done
          
          echo "TOTAL_DEFIS=$TOTAL" >> $GITHUB_ENV
          echo "Gesamtzahl: $TOTAL Defibrillatoren"
      
      - name: Update JSON File
        run: |
          # Heutiges Datum (YYYY-MM-DD)
          TODAY=$(date +%Y-%m-%d)
          
          # Lese existierende Daten
          HISTORICAL=$(cat historical-data.json)
          
          # Prüfe ob heute schon existiert
          EXISTS=$(echo "$HISTORICAL" | jq --arg date "$TODAY" '.[] | select(.date == $date) | .date')
          
          if [ -z "$EXISTS" ]; then
            # Füge neuen Eintrag hinzu
            echo "$HISTORICAL" | jq --arg date "$TODAY" --argjson count "$TOTAL_DEFIS" \
              '. += [{"date": $date, "count": $count}] | sort_by(.date)' \
              > historical-data.json
            
            echo "✅ Neuer Eintrag hinzugefügt: $TODAY → $TOTAL_DEFIS Defis"
            echo "UPDATE_MADE=true" >> $GITHUB_ENV
          else
            echo "ℹ️ Eintrag für $TODAY existiert bereits"
            echo "UPDATE_MADE=false" >> $GITHUB_ENV
          fi
      
      - name: Commit and Push
        if: env.UPDATE_MADE == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          
          git add historical-data.json
          git commit -m "📊 Automatisches Update: $(date +%Y-%m-%d) - $TOTAL_DEFIS Defibrillatoren"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
